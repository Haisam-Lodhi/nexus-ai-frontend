<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#669df6"/>
      <stop offset="50%" style="stop-color:#8ab4f8"/>
      <stop offset="100%" style="stop-color:#81c995"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c58af9"/>
      <stop offset="100%" style="stop-color:#8ab4f8"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaed"/>
      <stop offset="100%" style="stop-color:#c3e7ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1b1b1f" stroke="url(#nexusGrad)" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Outer glow ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#nexusGrad)" stroke-width="1" opacity="0.3" filter="url(#softGlow)"/>
  
  <!-- Nexus star burst - 8 pointed star -->
  <g transform="translate(60,60)" filter="url(#glow)">
    <!-- Main 4 rays -->
    <polygon points="0,-38 4,-12 0,-8 -4,-12" fill="url(#nexusGrad)" opacity="0.9"/>
    <polygon points="0,38 4,12 0,8 -4,12" fill="url(#nexusGrad)" opacity="0.9"/>
    <polygon points="-38,0 -12,4 -8,0 -12,-4" fill="url(#nexusGrad)" opacity="0.9"/>
    <polygon points="38,0 12,4 8,0 12,-4" fill="url(#nexusGrad)" opacity="0.9"/>
    
    <!-- Diagonal 4 rays -->
    <polygon points="-27,-27 -10,-6 -6,-6 -6,-10" fill="url(#innerGrad)" opacity="0.7"/>
    <polygon points="27,27 10,6 6,6 6,10" fill="url(#innerGrad)" opacity="0.7"/>
    <polygon points="27,-27 10,-6 6,-6 6,-10" fill="url(#innerGrad)" opacity="0.7"/>
    <polygon points="-27,27 -10,6 -6,6 -6,10" fill="url(#innerGrad)" opacity="0.7"/>
    
    <!-- Core circle -->
    <circle cx="0" cy="0" r="10" fill="url(#coreGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.9"/>
    
    <!-- Tiny accent dots -->
    <circle cx="0" cy="-22" r="1.5" fill="#8ab4f8" opacity="0.8"/>
    <circle cx="0" cy="22" r="1.5" fill="#81c995" opacity="0.8"/>
    <circle cx="-22" cy="0" r="1.5" fill="#c58af9" opacity="0.8"/>
    <circle cx="22" cy="0" r="1.5" fill="#8ab4f8" opacity="0.8"/>
  </g>
</svg>
